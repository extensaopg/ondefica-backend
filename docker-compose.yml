version: '3.8'

services:
  mysql:
    image: mysql:8.0

    container_name: mapa-eventos-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mapa_eventos

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
  mongo:
    image: mongo:7
    container_name: mapa-eventos-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
volumes:
  mysql_data:
  mongo_data: